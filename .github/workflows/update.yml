name: Actualización Diaria Medianoche
on:
  schedule:
    # Se ejecuta todos los días a las 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Simular actualización de datos
        run: |
          echo "Actualizando leyes y contenido para el Senador..."
          date > last_update.txt
          
      - name: Commit y Push de cambios
        run: |
          git config --global user.name 'Vibras Positivas HM Bot'
          git config --global user.email 'bot@vibraspositivas.com'
          git add last_update.txt
          git commit -m "Actualización automática diaria - Vibras Positivas HM" || echo "No hay cambios"
          git push
concurrency: 



