<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jota Pe Hernández - Firme</title>
    <meta name="theme-color" content="#eab308">
    <meta name="description" content="App oficial de gestión legislativa del Senador Jota Pe Hernández.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JotaPe">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://unavatar.io/twitter/JotaPeHernandez?size=192">
    <link rel="icon" type="image/png" href="https://unavatar.io/twitter/JotaPeHernandez?size=192">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: white; -webkit-tap-highlight-color: transparent; }
        .btn-link {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-link:active { transform: scale(0.97); background: #252525; }
        .profile-border { border: 3px solid #eab308; padding: 2px; }
        
        /* Estilo para los cajones expandibles */
        details summary::-webkit-details-marker { display: none; }
        details[open] summary svg { transform: rotate(180deg); }
        details summary { list-style: none; outline: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="font-sans antialiased">

    <div class="max-w-md mx-auto px-6 py-10 flex flex-col items-center min-h-screen">
        
        <div class="text-center mb-8">
            <div class="relative inline-block">
                <img src="https://unavatar.io/twitter/JotaPeHernandez" alt="Jota Pe" class="w-32 h-32 rounded-full profile-border shadow-2xl mb-4 object-cover">
                <span class="absolute bottom-6 right-1 bg-blue-600 text-white text-[10px] p-1 rounded-full border-2 border-black">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"></path></svg>
                </span>
            </div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">JOTA PE HERNÁNDEZ</h1>
            <p class="text-yellow-500 font-bold tracking-[0.2em] text-[10px] mt-1 uppercase">SENADOR DE LA REPÚBLICA</p>
        </div>

        <div id="links-container" class="w-full space-y-3 mb-8">
            <a href="https://www.youtube.com/@JotaPeHernandez" target="_blank" class="btn-link flex items-center p-4 rounded-2xl w-full">
                <span class="text-xl mr-4">📺</span>
                <span class="font-black flex-1 text-center text-xs tracking-widest uppercase">YOUTUBE - DENUNCIAS</span>
            </a>
            <a href="https://twitter.com/JotaPeHernandez" target="_blank" class="btn-link flex items-center p-4 rounded-2xl w-full">
                <span class="text-xl mr-4">🐦</span>
                <span class="font-bold flex-1 text-center text-xs tracking-widest uppercase">X / TWITTER</span>
            </a>
        </div>

        <div class="w-full mb-8">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase mb-4 tracking-[0.3em] text-center">Gestión Legislativa Diaria</h3>
            <div id="leyes-dinamicas-container" class="space-y-3">
                <div class="text-center py-4 text-zinc-600 text-[10px] animate-pulse uppercase tracking-widest">Sincronizando labor...</div>
            </div>
        </div>

        <div class="w-full p-4 bg-zinc-900 rounded-[2rem] border border-zinc-800">
            <h3 class="text-[9px] font-black text-zinc-500 uppercase mb-3 tracking-widest text-center">Video de Interés</h3>
            <div class="aspect-video bg-black rounded-2xl overflow-hidden shadow-inner">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/sf06x3Wxa6U" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <footer class="mt-auto pt-12 pb-4 text-center">
            <p class="text-[9px] text-zinc-600 tracking-[0.3em] font-bold uppercase leading-relaxed">
                SOFTWARE POR <br>
                <span class="text-zinc-400 text-[11px]">VIBRAS POSITIVAS HM</span>
            </p>
        </footer>
    </div>

    <script>
        // Función para cargar contenido desde leyes.json
        async function cargarLeyes() {
            const container = document.getElementById('leyes-dinamicas-container');
            try {
                const response = await fetch('leyes.json');
                const data = await response.json();
                
                // Rotación basada en el día del mes
                const hoy = new Date().getDate();
                const indice = hoy % data.proyectos.length;
                const p = data.proyectos[indice];

                container.innerHTML = `
                    <details class="group bg-[#121212] border border-zinc-800 rounded-2xl overflow-hidden shadow-lg">
                        <summary class="flex items-center justify-between p-4 cursor-pointer outline-none">
                            <div class="flex items-center gap-3">
                                <span class="text-xl">${p.emoji}</span>
                                <h4 class="font-black text-[11px] uppercase tracking-tight">${p.titulo}</h4>
                            </div>
                            <svg class="w-4 h-4 text-zinc-500 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </summary>
                        <div class="px-4 pb-4 animate-fadeIn">
                            <p class="text-[10px] text-zinc-400 leading-relaxed mb-4">${p.resumen}</p>
                            <a href="${p.enlace}" target="_blank" class="block text-center bg-yellow-600 text-black text-[9px] font-black py-2.5 rounded-xl uppercase active:scale-95 transition-transform">
                                Ver Gestión Completa
                            </a>
                        </div>
                    </details>
                `;
            } catch (error) {
                container.innerHTML = `<p class="text-[10px] text-red-900 text-center uppercase font-bold">Error al sincronizar datos</p>`;
            }
        }

        // Service Worker y Carga Inicial
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
                cargarLeyes();
            });
        }

        // Re-sincronizar si el usuario vuelve a la pestaña (después de medianoche)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') cargarLeyes();
        });
    </script>
</body>
</html>
